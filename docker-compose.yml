version: '3'

services:
  gateway:
    build:
      context: .
      target: backend-runner
    command: /app/memorose-gateway
    environment:
      - RUST_LOG=info
      - SHARD_COUNT=2
      - NODES=1=http://memorose-node-0:3000,2=http://memorose-node-1:3000
    ports:
      - "8080:8080"
    depends_on:
      - memorose-node-0
      - memorose-node-1

  memorose-node-0:
    build:
      context: .
      target: backend-runner
    command: /app/memorose-server
    environment:
      - RUST_LOG=info
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
    volumes:
      - data-shard-0:/app/data

  memorose-node-1:
    build:
      context: .
      target: backend-runner
    command: /app/memorose-server
    environment:
      - RUST_LOG=info
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
    volumes:
      - data-shard-1:/app/data

  dashboard:
    build:
      context: .
      target: dashboard-runner
    environment:
      - DASHBOARD_API_ORIGIN=http://memorose-node-0:3000
    ports:
      - "3100:3100"
    depends_on:
      - memorose-node-0

volumes:
  data-shard-0:
  data-shard-1:
